<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tối Ưu Thời Khóa Biểu AI - Minimal</title>
    
    <!-- Tải React và ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Tải Babel để biên dịch JSX trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ẩn thanh cuộn cho giao diện tối giản */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- CÁC COMPONENT ICON (Minimalist - Nét mảnh) ---
        const IconBase = ({ children, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Trash2 = ({className}) => <IconBase className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
        const Plus = ({className}) => <IconBase className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
        const Activity = ({className}) => <IconBase className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconBase>;
        const Sparkle = ({className}) => <IconBase className={className}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></IconBase>;

        // KHÔNG LƯU API KEY Ở ĐÂY NỮA ĐỂ BẢO MẬT

        const callGeminiAPI = async (prompt, systemInstruction, schema, retries = 5) => {
            // Thay đổi URL gọi API đến Backend Vercel của chính bạn
            const url = `/api/gemini`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: schema
                }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                }
            }
        };

        const SUBJECT_CATEGORIES = [
            { id: 'logic', label: 'Logic (Toán, Lý, Code)' },
            { id: 'social', label: 'Ghi nhớ (Văn, Sử, Sinh)' },
            { id: 'language', label: 'Ngôn ngữ (Tiếng Anh)' },
            { id: 'creative', label: 'Sáng tạo (Viết, Vẽ)' }
        ];

        function App() {
            const [subjects, setSubjects] = useState([
                { id: 1, name: 'Giải tích', category: 'logic', duration: 90 },
                { id: 2, name: 'Lịch sử thế giới', category: 'social', duration: 60 },
                { id: 3, name: 'Từ vựng Tiếng Anh', category: 'language', duration: 45 },
            ]);
            const [newSubject, setNewSubject] = useState({ name: '', category: 'logic', duration: 60 });
            const [availableTimes, setAvailableTimes] = useState({
                morning: { enabled: true, start: '08:00', end: '11:30' },
                afternoon: { enabled: true, start: '14:00', end: '17:00' },
                evening: { enabled: true, start: '20:00', end: '22:30' }
            });
            
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const handleAddSubject = (e) => {
                e.preventDefault();
                if (!newSubject.name.trim()) return;
                setSubjects([...subjects, { ...newSubject, id: Date.now() }]);
                setNewSubject({ name: '', category: 'logic', duration: 60 });
            };

            const handleRemoveSubject = (id) => setSubjects(subjects.filter(s => s.id !== id));

            const handleTimeChange = (period, field, value) => {
                setAvailableTimes(prev => ({
                    ...prev,
                    [period]: { ...prev[period], [field]: value }
                }));
            };

            const handleOptimize = async () => {
                if (subjects.length === 0) {
                    setError("Vui lòng thêm môn học.");
                    return;
                }
                
                setLoading(true);
                setError(null);
                setResult(null);

                const systemInstruction = `
                    Bạn là chuyên gia về Khoa học Nhận thức và Nhịp Sinh Học.
                    Xếp lịch học tối ưu dựa trên:
                    - Sáng (8h-11h): Cortisol cao, tốt cho logic, tính toán phức tạp.
                    - Chiều (14h-17h): Tư duy phân kỳ, tốt cho đọc hiểu, học thuộc, sáng tạo.
                    - Tối: Tốt cho củng cố trí nhớ, học ngôn ngữ.
                    Hãy chia nhỏ nếu môn quá dài.
                `;

                const prompt = `
                    Môn học: ${subjects.map(s => `${s.name} (${SUBJECT_CATEGORIES.find(c => c.id === s.category)?.label}, ${s.duration}p)`).join('; ')}
                    
                    Khung giờ:
                    Sáng: ${availableTimes.morning.enabled ? `${availableTimes.morning.start}-${availableTimes.morning.end}` : 'N/A'}
                    Chiều: ${availableTimes.afternoon.enabled ? `${availableTimes.afternoon.start}-${availableTimes.afternoon.end}` : 'N/A'}
                    Tối: ${availableTimes.evening.enabled ? `${availableTimes.evening.start}-${availableTimes.evening.end}` : 'N/A'}
                    
                    Yêu cầu: Xếp lịch không đè nhau, giải thích lý do khoa học ngắn gọn cho mỗi khung giờ.
                `;

                const schema = {
                    type: "OBJECT",
                    properties: {
                        schedule: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    timeSlot: { type: "STRING" },
                                    subjectName: { type: "STRING" },
                                    scientificReason: { type: "STRING" }
                                },
                                required: ["timeSlot", "subjectName", "scientificReason"]
                            }
                        },
                        generalAdvice: { type: "STRING" }
                    },
                    required: ["schedule", "generalAdvice"]
                };

                try {
                    const optimizedData = await callGeminiAPI(prompt, systemInstruction, schema);
                    setResult(optimizedData);
                } catch (err) {
                    setError("Lỗi kết nối AI. Vui lòng kiểm tra console/API Key.");
                } finally {
                    setLoading(false);
                }
            };

            // Render dòng nhập thời gian siêu gọn
            const TimeRow = ({ period, label }) => (
                <div className={`flex items-center justify-between text-sm py-2 border-b border-gray-100 transition-opacity ${!availableTimes[period].enabled ? 'opacity-40' : 'opacity-100'}`}>
                    <label className="flex items-center gap-2 cursor-pointer">
                        <input 
                            type="checkbox" 
                            className="w-3.5 h-3.5 accent-black rounded-sm border-gray-300"
                            checked={availableTimes[period].enabled}
                            onChange={(e) => handleTimeChange(period, 'enabled', e.target.checked)}
                        />
                        <span className="font-medium text-gray-700 w-12">{label}</span>
                    </label>
                    <div className="flex items-center gap-1.5">
                        <input type="time" value={availableTimes[period].start} onChange={e => handleTimeChange(period, 'start', e.target.value)} className="bg-transparent text-gray-600 outline-none w-16 text-center focus:text-black font-mono text-xs" disabled={!availableTimes[period].enabled} />
                        <span className="text-gray-300">-</span>
                        <input type="time" value={availableTimes[period].end} onChange={e => handleTimeChange(period, 'end', e.target.value)} className="bg-transparent text-gray-600 outline-none w-16 text-center focus:text-black font-mono text-xs" disabled={!availableTimes[period].enabled} />
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col md:flex-row h-screen w-full bg-[#fcfcfc]">
                    
                    {/* CỘT TRÁI: INPUTS (Sidebar) */}
                    <aside className="w-full md:w-[320px] lg:w-[360px] h-full flex flex-col border-r border-gray-200 bg-white shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10 relative">
                        <div className="p-6 md:p-8 flex-1 overflow-y-auto no-scrollbar">
                            
                            <header className="mb-10 text-center">
                                <h1 className="text-xl font-bold tracking-tight text-black mb-1">Tối Ưu Lịch Học</h1>
                                <p className="text-xs text-gray-400">Ứng dụng Khoa học Nhận thức & AI</p>
                            </header>

                            {/* Section: Khung Giờ */}
                            <section className="mb-10">
                                <h2 className="text-xs font-bold uppercase tracking-wider text-gray-400 mb-4">Khung thời gian</h2>
                                <div className="space-y-1">
                                    <TimeRow period="morning" label="Sáng" />
                                    <TimeRow period="afternoon" label="Chiều" />
                                    <TimeRow period="evening" label="Tối" />
                                </div>
                            </section>

                            {/* Section: Môn Học */}
                            <section className="mb-8">
                                <h2 className="text-xs font-bold uppercase tracking-wider text-gray-400 mb-4 flex justify-between items-center">
                                    <span>Môn học ({subjects.length})</span>
                                </h2>
                                
                                <ul className="space-y-2 mb-4">
                                    {subjects.map(subject => (
                                        <li key={subject.id} className="group flex items-start justify-between p-3 rounded-lg border border-gray-100 hover:border-gray-300 transition-colors bg-gray-50/50">
                                            <div>
                                                <p className="text-sm font-medium text-gray-900 leading-tight">{subject.name}</p>
                                                <p className="text-xs text-gray-500 mt-1.5 flex items-center gap-2">
                                                    <span>{subject.duration}p</span>
                                                    <span className="w-1 h-1 rounded-full bg-gray-300"></span>
                                                    <span>{SUBJECT_CATEGORIES.find(c => c.id === subject.category)?.label.split(' ')[0]}</span>
                                                </p>
                                            </div>
                                            <button onClick={() => handleRemoveSubject(subject.id)} className="text-gray-300 hover:text-black opacity-0 group-hover:opacity-100 transition-all p-1">
                                                <Trash2 className="w-3.5 h-3.5" />
                                            </button>
                                        </li>
                                    ))}
                                </ul>

                                <form onSubmit={handleAddSubject} className="space-y-3 pt-3 border-t border-gray-100">
                                    <input
                                        type="text" placeholder="Thêm môn học..."
                                        className="w-full text-sm bg-transparent border-b border-gray-200 pb-2 focus:outline-none focus:border-black transition-colors"
                                        value={newSubject.name} onChange={e => setNewSubject({...newSubject, name: e.target.value})}
                                    />
                                    <div className="flex gap-3">
                                        <select
                                            className="flex-1 bg-transparent text-xs text-gray-600 border-b border-gray-200 pb-2 focus:outline-none focus:text-black focus:border-black"
                                            value={newSubject.category} onChange={e => setNewSubject({...newSubject, category: e.target.value})}
                                        >
                                            {SUBJECT_CATEGORIES.map(cat => <option key={cat.id} value={cat.id}>{cat.label}</option>)}
                                        </select>
                                        <input
                                            type="number" min="15" step="15" placeholder="Phút"
                                            className="w-16 bg-transparent text-xs text-center border-b border-gray-200 pb-2 focus:outline-none focus:border-black font-mono"
                                            value={newSubject.duration} onChange={e => setNewSubject({...newSubject, duration: parseInt(e.target.value) || 0})}
                                        />
                                    </div>
                                    <button type="submit" disabled={!newSubject.name.trim()} className="w-full mt-2 py-2 text-xs font-medium text-gray-500 hover:text-black border border-gray-200 hover:border-black rounded flex items-center justify-center gap-1.5 transition-all disabled:opacity-30">
                                        <Plus className="w-3.5 h-3.5" /> Thêm nhanh
                                    </button>
                                </form>
                            </section>

                        </div>

                        {/* Button Tạo Lịch (Nằm sát dưới cột trái) */}
                        <div className="p-6 border-t border-gray-100 bg-white">
                            {error && <p className="text-xs text-red-500 mb-3 leading-tight">{error}</p>}
                            <button
                                onClick={handleOptimize}
                                disabled={loading || subjects.length === 0}
                                className="w-full py-3.5 bg-black hover:bg-gray-800 text-white text-sm font-medium rounded-lg flex items-center justify-center gap-2 transition-all disabled:opacity-50"
                            >
                                {loading ? <Activity className="w-4 h-4 animate-pulse" /> : <Sparkle className="w-4 h-4" />}
                                {loading ? 'Đang phân tích...' : 'Tối Ưu Ngay'}
                            </button>
                        </div>
                    </aside>

                    {/* CỘT PHẢI: KẾT QUẢ (Main Content) */}
                    <main className="flex-1 h-full overflow-hidden flex flex-col relative bg-[#fafafa]">
                        {result ? (
                            <div className="flex-1 w-full h-full p-8 md:p-12 overflow-y-auto no-scrollbar flex flex-col justify-center animate-in fade-in duration-700">
                                
                                <div className="max-w-5xl mx-auto w-full">
                                    <h2 className="text-2xl md:text-3xl font-light text-black tracking-tight mb-16">
                                        Lịch Trình <span className="font-semibold">Khuyến Nghị</span>
                                    </h2>

                                    {/* TIMELINE NẰM NGANG */}
                                    <div className="relative w-full">
                                        <div className="flex overflow-x-auto no-scrollbar pb-12 pt-2 gap-4 md:gap-8 snap-x snap-mandatory">
                                            {result.schedule.map((item, index) => (
                                                <div key={index} className="shrink-0 w-64 md:w-72 snap-start relative group">
                                                    
                                                    {/* Đường line kết nối (Không render ở item cuối) */}
                                                    {index !== result.schedule.length - 1 && (
                                                        <div className="absolute top-[5px] left-3 w-full h-[1px] bg-gray-200 transition-colors group-hover:bg-gray-300"></div>
                                                    )}
                                                    
                                                    {/* Điểm Timeline (Dot) */}
                                                    <div className="w-[11px] h-[11px] rounded-full bg-black relative z-10 mb-6 shadow-[0_0_0_4px_#fafafa] transition-transform group-hover:scale-125"></div>
                                                    
                                                    {/* Nội dung Card */}
                                                    <div className="pr-6">
                                                        <span className="inline-block px-2.5 py-1 bg-gray-100 text-gray-600 text-[10px] font-mono rounded-full mb-3 tracking-wide">
                                                            {item.timeSlot}
                                                        </span>
                                                        <h3 className="text-lg font-bold text-black mb-3 leading-snug">
                                                            {item.subjectName}
                                                        </h3>
                                                        <p className="text-sm text-gray-500 leading-relaxed">
                                                            {item.scientificReason}
                                                        </p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        {/* Gợi ý mờ bên phải báo hiệu có thể cuộn ngang */}
                                        <div className="absolute right-0 top-0 bottom-12 w-16 bg-gradient-to-l from-[#fafafa] to-transparent pointer-events-none"></div>
                                    </div>

                                    {result.generalAdvice && (
                                        <div className="mt-8 pt-8 border-t border-gray-200 max-w-2xl">
                                            <h4 className="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">Tóm tắt & Lời khuyên</h4>
                                            <p className="text-sm text-gray-600 leading-loose">
                                                {result.generalAdvice}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-center p-8">
                                <div className="w-16 h-16 rounded-2xl bg-white border border-gray-100 shadow-sm flex items-center justify-center mb-6">
                                    <Sparkle className="w-6 h-6 text-gray-300" />
                                </div>
                                <h3 className="text-lg font-medium text-gray-900 mb-2 tracking-tight">Không gian làm việc trống</h3>
                                <p className="text-sm text-gray-400 max-w-sm leading-relaxed">
                                    Thêm các môn học vào danh sách bên trái và nhấn Tối Ưu để AI phân bổ thời gian dựa trên nhịp sinh học của bạn.
                                </p>
                            </div>
                        )}
                    </main>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
